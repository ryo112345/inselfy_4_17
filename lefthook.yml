# git hooks 管理（C9: シークレット漏洩の予防層）。
# セットアップ（各開発者が一度だけ実行）:
#   npm install                                            # リポジトリルートで。lefthook が入り prepare が hook を配線
#   go install github.com/zricethezav/gitleaks/v8@v8.30.1  # gitleaks 本体
# 詳細は docs/security-secrets.md を参照。
#
# 各コマンドの PATH に $HOME/go/bin を足しているのは、非対話シェル（GUI クライアントや
# エージェント経由の git commit）では ~/.zshrc が読まれず gitleaks が見つからないため。
pre-commit:
  commands:
    gitleaks:
      run: PATH="$PATH:$HOME/go/bin" gitleaks git --pre-commit --staged --no-banner

# push で手元から外に出る直前の最後の砦（GitHub の Push protection は private では
# 有料のため、その無料近似）。pre-commit を --no-verify や fail-open ですり抜けた
# コミットをここで捕まえる。通常は未 push 分だけの高速スキャン、範囲が取れない場合
# （origin/main 未取得など）は全履歴スキャン（実測8秒程度）にフォールバック。
pre-push:
  commands:
    gitleaks:
      run: export PATH="$PATH:$HOME/go/bin"; gitleaks git --no-banner --log-opts "origin/main..HEAD" || gitleaks git --no-banner
    # 生成コードのドリフト検査（CI の generated-code-drift の手元版）。
    # 全再生成は十数秒かかるため、生成元（TypeSpec / SQL / converter 定義 / codegen 設定）を
    # 触った push のときだけ実行する。origin/main が取れない場合は安全側に倒して必ず実行
    generated-drift:
      run: |
        if CHANGED=$(git diff --name-only origin/main..HEAD -- \
            api-schema/typespec api-schema/scripts \
            backend/internal/adapter/gateway/db/sqlc/queries \
            backend/sqlc.yaml backend/oapi-codegen.yaml \
            ':(glob)backend/**/*_converter.go' 2>/dev/null); then
          [ -z "$CHANGED" ] && exit 0
        fi
        scripts/check-generated-drift.sh
