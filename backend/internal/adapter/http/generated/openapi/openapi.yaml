        updatedAt:
          type: string
          format: date-time
          description: 更新日時
      description: ユーザー情報
    Models.Uuid:
      type: string
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
      description: UUID 形式の識別子
    Models.WVNeedDefResponse:
      type: object
      required:
        - id
        - label
        - descriptionJa
      properties:
        id:
          type: string
          description: ニーズID
        label:
          type: string
          description: ラベル
        descriptionJa:
          type: string
          description: 説明（日本語）
      description: Work Need 定義
    Models.WVNeedScore:
      type: object
      required:
        - needId
        - label
        - descriptionJa
        - displayScore
        - rank
      properties:
        needId:
          type: string
          description: ニーズID
        label:
          type: string
          description: ラベル
        descriptionJa:
          type: string
          description: 説明（日本語）
        displayScore:
          type: number
          format: double
          description: 表示スコア（0-100）
        rank:
          type: integer
          format: int32
          description: 順位
      description: Work Need スコア
    Models.WVPairResponse:
      type: object
      required:
        - needA
        - needB
      properties:
        needA:
          type: string
          description: ニーズA
        needB:
          type: string
          description: ニーズB
      description: 一対比較ペア
    Models.WVResponseItem:
      type: object
      required:
        - needA
        - needB
        - winner
        - questionNumber
      properties:
        needA:
          type: string
          description: ニーズA
        needB:
          type: string
          description: ニーズB
        winner:
          type: string
          description: 勝者（needA か needB の ID）
        questionNumber:
          type: integer
          format: int32
          description: 質問番号
