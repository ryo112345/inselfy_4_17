        headline:
          type: string
          nullable: true
          maxLength: 255
          description: ヘッドライン（肩書き・一言）
        location:
          type: string
          nullable: true
          maxLength: 100
          description: 居住地
        about:
          type: string
          nullable: true
          maxLength: 2000
          description: 自己紹介
        industry:
          type: string
          nullable: true
          maxLength: 100
          description: 業界
        jobType:
          type: string
          nullable: true
          maxLength: 50
          description: 職種タグ
        jobSeekingStatus:
          type: string
          nullable: true
          maxLength: 50
          description: 求職ステータス
        profileColor:
          type: string
          nullable: true
          pattern: ^#[0-9A-Fa-f]{6}$
          description: プロフィールカラー（`#RRGGBB`）
        avatarUrl:
          type: string
          nullable: true
          description: アバター画像URL
        coverPhotoUrl:
          type: string
          nullable: true
          description: カバー写真URL
        isPublic:
          type: boolean
          description: プロフィール公開フラグ
