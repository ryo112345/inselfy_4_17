      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 200
          description: 会社名
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: 役職・タイトル
        startYear:
          type: integer
          format: int32
          minimum: 1950
          maximum: 2100
          description: 開始年
        startMonth:
          type: integer
          format: int32
          minimum: 1
          maximum: 12
