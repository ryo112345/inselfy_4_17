  /api/jobs:
    get:
      operationId: PublicJobPostings_listPublicJobPostings
      summary: List public job postings
      description: |-
        公開求人一覧。常にページングラッパー（items/total）で返す。
        `limit > 0` を指定すると search / category / employmentType / remotePolicy /
        sort / valueFilters / filterMode を解釈してページングし、limit 未指定（0）のときは全件を返す。
      parameters:
        - name: limit
          in: query
          required: false
          description: 取得件数（>0 でページングモード）
          schema:
            type: integer
            format: int32
          explode: false
        - name: offset
          in: query
          required: false
          description: オフセット
          schema:
            type: integer
            format: int32
          explode: false
        - name: search
          in: query
          required: false
          description: フリーワード
          schema:
            type: string
          explode: false
        - name: category
          in: query
          required: false
          description: 職種カテゴリ
          schema:
            type: string
          explode: false
        - name: employmentType
          in: query
          required: false
          description: 雇用形態
          schema:
            type: string
          explode: false
        - name: remotePolicy
          in: query
          required: false
          description: リモートポリシー
          schema:
            type: string
          explode: false
        - name: sort
          in: query
          required: false
          description: ソートキー
          schema:
            $ref: '#/components/schemas/Models.JobPostingSort'
          explode: false
        - name: valueFilters
          in: query
          required: false
          description: Work Values フィルタ（`id:score` のカンマ区切り）
          schema:
            type: string
            pattern: ^[A-Za-z0-9_-]+:[0-9]+(\.[0-9]+)?(,[A-Za-z0-9_-]+:[0-9]+(\.[0-9]+)?)*$
          explode: false
        - name: filterMode
          in: query
          required: false
          description: フィルタモード（未指定時は values）
          schema:
            $ref: '#/components/schemas/Models.JobPostingFilterMode'
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.JobPostingListResponse'
        '400':
          description: Bad Request エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - JobPostings
  /api/jobs/{jobId}:
    get:
      operationId: PublicJobPostings_getPublicJobPosting
