    Models.WVResultResponse:
      type: object
      required:
        - id
        - sessionId
        - userId
        - needs
        - values
        - hasReport
        - reportRequested
        - createdAt
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/Models.Uuid'
          description: 結果ID
        sessionId:
          allOf:
            - $ref: '#/components/schemas/Models.Uuid'
          description: セッションID
        userId:
          allOf:
            - $ref: '#/components/schemas/Models.Uuid'
          description: ユーザーID
        needs:
          type: array
          items:
            $ref: '#/components/schemas/Models.WVNeedScore'
          description: ニーズスコア（スコア降順）
        values:
          type: array
          items:
            $ref: '#/components/schemas/Models.WVValueScoreResponse'
          description: Value スコア
        hasReport:
          type: boolean
          description: このセッションのAIレポートが生成済みかどうか
        reportRequested:
          type: boolean
          description: このセッションのAIレポート作成依頼が済んでいるかどうか
        createdAt:
          type: string
          description: 作成日時（RFC3339 文字列）
      description: Work Values 診断結果
    Models.WVSessionResponse:
      type: object
      required:
        - id
        - status
        - initialPairs
        - needs
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/Models.Uuid'
          description: セッションID
        status:
          allOf:
            - $ref: '#/components/schemas/Models.DiagnosisSessionStatus'
          description: ステータス
        initialPairs:
          type: array
          items:
            $ref: '#/components/schemas/Models.WVPairResponse'
          description: 初期ペア
        needs:
          type: array
          items:
            $ref: '#/components/schemas/Models.WVNeedDefResponse'
          description: ニーズ定義一覧
      description: Work Values セッション
    Models.WVSubmitResultRequest:
      type: object
      required:
        - responses
        - mu
        - se
      properties:
        responses:
          type: array
          items:
            $ref: '#/components/schemas/Models.WVResponseItem'
          description: 回答一覧
        mu:
          type: object
          additionalProperties:
            type: number
            format: double
          description: フロント推定の μ（ニーズID → 値）
        se:
          type: object
          additionalProperties:
            type: number
            format: double
          description: フロント推定の SE（ニーズID → 値）
      description: Work Values 結果送信リクエスト
    Models.WVValueScoreResponse:
      type: object
      required:
        - valueId
        - displayScore
        - rank
      properties:
        valueId:
          type: string
          description: Value ID
        displayScore:
          type: number
          format: double
          description: 表示スコア（0-100）
        rank:
          type: integer
          format: int32
          description: 順位
      description: Work Value スコア
  securitySchemes:
    CandidateAuth:
      type: apiKey
      in: cookie
      name: inselfy_token
      description: |-
        候補者認証。`inselfy_token` cookie の JWT を検証する
        （開発用に `Authorization: Bearer` ヘッダーでも代替可）。
    CompanyAuth:
      type: apiKey
      in: cookie
      name: company_token
      description: |-
        企業認証。`company_token` cookie の JWT を検証する
        （開発用に `Authorization: Bearer` ヘッダーでも代替可）。
    AdminAuth:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: |-
        管理者認証。`X-Admin-Key` ヘッダーを静的ブートストラップキー
        （ADMIN_API_KEY）または admins テーブルの個人トークンと照合する。
servers:
  - url: http://localhost:8081
    description: Development server
    variables: {}
