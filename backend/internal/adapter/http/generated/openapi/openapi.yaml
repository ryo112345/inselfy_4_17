        endYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 終了年（現職の場合は null）
        endMonth:
          type: integer
          format: int32
          nullable: true
          minimum: 1
          maximum: 12
