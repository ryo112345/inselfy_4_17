        name:
          type: string
          description: チーム名
        description:
          type: string
          nullable: true
          description: 説明
        isPublic:
          type: boolean
          nullable: true
          description: 公開フラグ（未指定なら変更しない）
      description: チーム更新リクエスト
    Models.UpdateUserProfileRequest:
      type: object
      properties:
        username:
          type: string
          pattern: ^[a-zA-Z0-9_]{3,20}$
