        degree:
          type: string
          nullable: true
          maxLength: 200
          description: 学部・学科・学位
        startYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 入学年
        endYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 卒業年
      description: 学歴更新リクエスト
    Models.UpdateExperienceRequest:
      type: object
      required:
        - companyName
