      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/Models.Uuid'
          description: ユーザーID
        username:
          type: string
          description: ユーザー名
        name:
          type: string
          description: 表示名
        headline:
          type: string
          nullable: true
          description: ヘッドライン
        location:
          type: string
          nullable: true
          description: 居住地
        about:
          type: string
          nullable: true
          description: 自己紹介
        industry:
          type: string
          nullable: true
          description: 業界
        jobType:
          type: string
          nullable: true
          description: 職種
        jobSeekingStatus:
          type: string
          nullable: true
          description: 求職ステータス
        profileColor:
          type: string
          nullable: true
          description: プロフィールカラー
        avatarUrl:
          type: string
          nullable: true
          description: アバター画像URL
        coverPhotoUrl:
          type: string
          nullable: true
          description: カバー写真URL
        isPublic:
          type: boolean
