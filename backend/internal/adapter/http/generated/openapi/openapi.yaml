components:
  schemas:
    Models.AddTeamMemberRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: メンバー名
        email:
          type: string
          nullable: true
          description: 招待メールアドレス
      description: チームメンバー追加リクエスト
    Models.AdminAiReportListItem:
      type: object
      required:
        - id
        - session_id
        - user_id
        - username
        - name
        - created_at
        - viewed_at
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/Models.Uuid'
          description: レポートID
        session_id:
          allOf:
            - $ref: '#/components/schemas/Models.Uuid'
          description: セッションID
        user_id:
          allOf:
            - $ref: '#/components/schemas/Models.Uuid'
          description: ユーザーID
        username:
          type: string
          description: ユーザー名
        name:
          type: string
          description: 表示名
        created_at:
          type: string
          format: date-time
          description: 作成日時
        viewed_at:
          type: string
          format: date-time
          nullable: true
          description: ユーザーの閲覧日時（未閲覧なら null）
      description: 生成済みAIレポート一覧アイテム（Work Values / Career Interest 共通）
    Models.AdminAiReportListResponse:
      type: object
      required:
        - reports
        - total
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/Models.AdminAiReportListItem'
          description: レポート一覧
        total:
          type: integer
          format: int32
          minimum: 0
          description: 総件数
      description: 生成済みAIレポート一覧レスポンス
    Models.AdminCompanyBypassLoginResponse:
      type: object
      required:
        - message
        - companyName
      properties:
        message:
          type: string
          description: 固定で "ok"
        companyName:
          type: string
          description: ログインした企業の企業名
      description: 企業成り代わりログイン結果（cookie はレスポンスで焼かれる）
    Models.AdminCompanyItem:
      type: object
      required:
        - id
        - email
        - companyName
        - contactPersonName
        - phoneNumber
        - status
