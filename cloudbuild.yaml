# イメージタグは git SHA に統一する（BUILD_ID はビルドには紐づくがコードに紐づかない。
# latest は「どのコードが動いているか」を追えなくするので使わない）。
# _GIT_SHA は submit 時に必須: docs/deploy-plan.md のデプロイコマンドを参照。
steps:
  # Build and push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_CLIENT_ID=943028700787-o7mad2o995vm6q7f3q5gg6avusrfds79.apps.googleusercontent.com'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${_GIT_SHA}'
      - '.'

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${_GIT_SHA}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${_GIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'API_PORT=8081,DB_USER=neondb_owner,DB_HOST=ep-super-pine-aohjguv8-pooler.c-2.ap-southeast-1.aws.neon.tech,DB_PORT=5432,DB_NAME=neondb,DB_SSLMODE=require,STORAGE_BACKEND=r2,R2_ACCOUNT_ID=3fb924380437d8136e9079f0f5598ce8,R2_BUCKET=inselfy-uploads,R2_PUBLIC_URL=https://pub-c9accd8c7dd34ac1b0edd86723d4555d.r2.dev,GOOGLE_CLIENT_ID=943028700787-o7mad2o995vm6q7f3q5gg6avusrfds79.apps.googleusercontent.com,LINE_CHANNEL_ID=2009609875,INITIAL_ADMIN_EMAIL=ryo.akiyama112345@gmail.com'
      - '--set-secrets'
      - 'DB_PASSWORD=db-password:latest,JWT_SECRET=jwt-secret:latest,LINE_CHANNEL_SECRET=line-channel-secret:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,R2_ACCESS_KEY_ID=r2-access-key-id:latest,R2_SECRET_ACCESS_KEY=r2-secret-access-key:latest'

substitutions:
  _REGION: asia-northeast1
  _REPO_NAME: inselfy
  _SERVICE_NAME: inselfy
  # デプロイ対象のコミットSHA。デフォルト無し（空のままだと不正なタグでビルドが落ちる）。
  # submit 時に --substitutions=_GIT_SHA=$(git rev-parse --short=12 HEAD) で渡す
  _GIT_SHA: ''

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${_GIT_SHA}'
