        - Notifications
  /api/notifications/unread-count:
    get:
      operationId: UserNotifications_countUserUnreadNotifications
      summary: Count unread notifications for the authenticated user
      description: 未読件数（要ログイン）
      parameters: []
      responses:
        '200':
