  /api/users:
    post:
      operationId: Users_createUser
      summary: Create a new user
      description: ユーザー作成
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UserResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.ConflictError'
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreateUserRequest'
  /api/users/id/{userId}/similar:
    get:
      operationId: SimilarUsers_getSimilarUsers
      summary: Get users with similar work values
      description: Work Values 診断結果に基づく類似ユーザー取得
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: 取得件数（1-50、デフォルト10）
          schema:
            type: integer
            format: int32
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.SimilarUsersResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.NotFoundError'
      tags:
        - SimilarUsers
  /api/users/{username}:
