  /api/company/scouts/{scoutId}:
    get:
      operationId: CompanyScouts_getCompanyScoutDetail
      summary: Get scout detail with replies
      description: スカウト詳細取得（企業認証）
      parameters:
        - name: scoutId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
