  /api/scout-settings:
    get:
      operationId: ScoutSettings_getScoutSettings
      summary: Get scout settings for the authenticated user
      description: スカウト受け入れ設定取得（要ログイン）
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ScoutSettingsResponse'
        default:
