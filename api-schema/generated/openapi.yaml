components:
  schemas:
    Models.AttachSkillRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: スキル名（1-100文字）
      description: スキル追加リクエスト
    Models.AuthUserResponse:
      type: object
      required:
        - id
        - username
        - name
        - needsSetup
        - createdAt
      properties:
        id:
          type: string
          description: ユーザーID
        username:
          type: string
          description: ユーザー名
        name:
          type: string
          description: 表示名
        avatarUrl:
          type: string
          description: アバター画像URL
        email:
          type: string
          description: メールアドレス
        needsSetup:
          type: boolean
          description: 初期セットアップが必要か（自動生成ユーザー名のまま）
        createdAt:
          type: string
          format: date-time
          description: 作成日時
      description: 認証ユーザー情報（トークンは HttpOnly cookie で返る）
    Models.BadRequestError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - BAD_REQUEST
        message:
          type: string
        details: {}
      description: Bad Request エラー
    Models.CIBasicScoreResponse:
      type: object
      required:
        - basic_interest_id
        - score
        - rank
      properties:
        basic_interest_id:
          type: string
          description: 基本興味領域ID
        score:
          type: number
          format: double
          description: スコア
        rank:
          type: integer
          format: int32
          description: 順位
      description: 基本興味領域スコア
    Models.CIItemResponse:
      type: object
      required:
        - question_number
        - item_code
        - basic_interest_id
        - skill_level
        - activity_type
        - text_ja
      properties:
        question_number:
          type: integer
          format: int32
          description: 質問番号
        item_code:
          type: string
          description: 項目コード
        basic_interest_id:
          type: string
          description: 基本興味領域ID
        skill_level:
          type: string
          description: スキルレベル
        activity_type:
          type: string
          description: 活動種別
        text_ja:
          type: string
          description: 設問文（日本語）
      description: Career Interest 設問
    Models.CIResponseItem:
      type: object
      required:
        - question_number
        - item_code
        - score
      properties:
        question_number:
          type: integer
          format: int32
          description: 質問番号
        item_code:
          type: string
          description: 項目コード
        score:
          type: integer
          format: int32
          description: 回答スコア
      description: Career Interest 回答（1問分）
    Models.CIResultResponse:
      type: object
      required:
        - id
        - session_id
        - user_id
        - basic_scores
        - type_scores
        - created_at
      properties:
        id:
          type: string
          description: 結果ID
        session_id:
          type: string
          description: セッションID
        user_id:
          type: string
          description: ユーザーID
        basic_scores:
          type: array
          items:
            $ref: '#/components/schemas/Models.CIBasicScoreResponse'
          description: 基本興味領域スコア
        type_scores:
          type: array
          items:
            $ref: '#/components/schemas/Models.CITypeScoreResponse'
          description: RIASEC タイプスコア
        created_at:
          type: string
          description: 作成日時（RFC3339 文字列）
      description: Career Interest 診断結果
    Models.CISessionResponse:
      type: object
      required:
        - id
        - status
        - items
      properties:
        id:
          type: string
          description: セッションID
