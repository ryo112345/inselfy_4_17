        question_number:
          type: integer
          format: int32
          description: 質問番号
        item_code:
          type: string
          description: 項目コード
        basic_interest_id:
          type: string
          description: 基本興味領域ID
        skill_level:
          type: string
          description: スキルレベル
        activity_type:
          type: string
          description: 活動種別
        text_ja:
          type: string
          description: 設問文（日本語）
      description: Career Interest 設問
    Models.CIResponseItem:
      type: object
      required:
        - question_number
        - item_code
        - score
      properties:
        question_number:
          type: integer
          format: int32
          description: 質問番号
        item_code:
          type: string
          description: 項目コード
        score:
          type: integer
          format: int32
          description: 回答スコア
      description: Career Interest 回答（1問分）
    Models.CIResultResponse:
      type: object
      required:
        - id
        - session_id
        - user_id
        - basic_scores
        - type_scores
        - created_at
