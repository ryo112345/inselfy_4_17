      tags:
        - CompanyScouts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CompanyScoutReplyRequest'
  /api/notifications:
    get:
      operationId: UserNotifications_listUserNotifications
      summary: List notifications for the authenticated user
      description: 通知一覧（要ログイン）
      parameters:
        - name: limit
          in: query
          required: false
          description: 取得件数
          schema:
            type: integer
            format: int32
          explode: false
        - name: offset
          in: query
