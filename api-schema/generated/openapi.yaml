      operationId: Users_getUserByUsername
      summary: Get a user by username
      description: ユーザー名でユーザー取得
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UserResponse'
        default:
