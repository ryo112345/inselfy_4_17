  /api/notifications/read-all:
    post:
      operationId: UserNotifications_markAllUserNotificationsRead
      summary: Mark all notifications as read for the authenticated user
      description: 全件既読化（要ログイン）
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Notifications
  /api/notifications/unread-count:
    get:
      operationId: UserNotifications_countUserUnreadNotifications
      summary: Count unread notifications for the authenticated user
      description: 未読件数（要ログイン）
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UnreadCountResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
