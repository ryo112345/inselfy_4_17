              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - CompanyScouts
  /api/company/scouts/quality:
    get:
      operationId: CompanyScouts_getScoutQuality
      summary: Get scout quality score
      description: スカウト品質スコア取得（企業認証）
