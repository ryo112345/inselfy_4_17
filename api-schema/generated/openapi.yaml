      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreatePostRequest'
    get:
      operationId: Posts_listTimelinePosts
      summary: List timeline posts
      description: タイムライン取得
      parameters:
        - name: viewerId
          in: query
          required: false
          description: 閲覧者ユーザーID（いいね済み判定に使用）
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
