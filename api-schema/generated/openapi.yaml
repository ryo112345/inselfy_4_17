openapi: 3.0.0
info:
  title: inselfy API
  version: 0.0.0
tags:
  - name: Users
  - name: Experiences
  - name: Educations
  - name: Skills
  - name: ScoutSettings
  - name: SimilarUsers
  - name: TeamDiagnose
  - name: ScoutTemplates
  - name: Notifications
  - name: Follows
  - name: Auth
  - name: CompanyAuth
  - name: CareerInterest
  - name: WorkValues
  - name: Posts
  - name: CompanyScouts
  - name: CandidateScouts
paths:
  /api/auth/google:
    post:
      operationId: Auth_googleLogin
      summary: Login with a Google ID token
      description: Google ログイン。成功時は HttpOnly cookie にトークンを設定し、ユーザー情報を返す
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.AuthUserResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.UnauthorizedError'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.GoogleLoginRequest'
  /api/auth/logout:
    post:
      operationId: Auth_logout
      summary: Logout and clear auth cookies
      description: ログアウト（認証 cookie を削除）
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - Auth
  /api/auth/me:
    get:
      operationId: Auth_getMe
      summary: Get the authenticated user
      description: ログイン中ユーザー情報取得
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.AuthUserResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.UnauthorizedError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
      tags:
        - Auth
  /api/auth/refresh:
    post:
      operationId: Auth_refreshToken
      summary: Refresh the access token via cookie
      description: トークンリフレッシュ（refresh_token cookie 使用）。cookie を更新しユーザー情報を返す
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.AuthUserResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UnauthorizedError'
      tags:
        - Auth
  /api/career-interest/sessions:
    post:
      operationId: CareerInterest_ciStartSession
      summary: Start a career interest session
      description: 診断セッション開始
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.CISessionResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
      tags:
        - CareerInterest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CIStartSessionRequest'
  /api/career-interest/sessions/{sessionId}/results:
    post:
      operationId: CareerInterest_ciSubmitResult
      summary: Submit career interest responses
      description: 診断結果送信
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.CIResultResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
      tags:
        - CareerInterest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CISubmitResultRequest'
    get:
      operationId: CareerInterest_ciGetResultBySession
      summary: Get the career interest result by session
      description: セッションIDで診断結果取得
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.CIResultResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - CareerInterest
  /api/career-interest/users/{userId}/results/latest:
    get:
      operationId: CareerInterest_ciGetLatestResult
      summary: Get the latest career interest result for a user
      description: 最新の診断結果取得
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.CIResultResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - CareerInterest
  /api/company/auth/login:
    post:
      operationId: CompanyAuth_companyLogin
      summary: Login as a company
      description: 企業ログイン。成功時は HttpOnly cookie にトークンを設定し、企業情報を返す
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.CompanyResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.UnauthorizedError'
      tags:
        - CompanyAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CompanyLoginRequest'
  /api/company/auth/logout:
    post:
      operationId: CompanyAuth_companyLogout
      summary: Logout the company and clear auth cookies
      description: ログアウト（認証 cookie を削除）
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - CompanyAuth
  /api/company/auth/me:
    get:
      operationId: CompanyAuth_companyGetMe
      summary: Get the authenticated company
      description: ログイン中の企業情報取得
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.CompanyResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.UnauthorizedError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
      tags:
        - CompanyAuth
  /api/company/auth/refresh:
    post:
      operationId: CompanyAuth_companyRefreshToken
      summary: Refresh the company access token via cookie
      description: トークンリフレッシュ（company_refresh_token cookie 使用）
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.CompanyResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UnauthorizedError'
      tags:
        - CompanyAuth
  /api/company/auth/register:
    post:
      operationId: CompanyAuth_companyRegister
      summary: Register a company account
      description: 企業アカウント登録
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.CompanyResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.ConflictError'
                  - $ref: '#/components/schemas/Models.UnauthorizedError'
      tags:
        - CompanyAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CompanyRegisterRequest'
  /api/company/notifications:
    get:
      operationId: CompanyNotifications_listCompanyNotifications
      summary: List notifications for the authenticated company
      description: 通知一覧（企業認証）
      parameters:
        - name: limit
          in: query
          required: false
          description: 取得件数
          schema:
            type: integer
            format: int32
          explode: false
        - name: offset
          in: query
          required: false
          description: オフセット
          schema:
            type: integer
            format: int32
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.NotificationListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Notifications
  /api/company/notifications/read-all:
    post:
      operationId: CompanyNotifications_markAllCompanyNotificationsRead
      summary: Mark all notifications as read for the authenticated company
      description: 全件既読化（企業認証）
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Notifications
  /api/company/notifications/unread-count:
    get:
      operationId: CompanyNotifications_countCompanyUnreadNotifications
      summary: Count unread notifications for the authenticated company
      description: 未読件数（企業認証）
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UnreadCountResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Notifications
  /api/company/notifications/{id}/read:
    post:
      operationId: CompanyNotifications_markCompanyNotificationRead
      summary: Mark a company notification as read
      description: 既読化
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Notifications
  /api/company/scout-templates:
    post:
      operationId: ScoutTemplates_createScoutTemplate
      summary: Create a scout template
      description: スカウトテンプレート作成（企業認証）
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ScoutTemplateResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - ScoutTemplates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreateScoutTemplateRequest'
    get:
      operationId: ScoutTemplates_listScoutTemplates
      summary: List scout templates
      description: スカウトテンプレート一覧（企業認証）。裸の配列を返す（互換のため）
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Models.ScoutTemplateResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - ScoutTemplates
  /api/company/scout-templates/{templateId}:
    get:
      operationId: ScoutTemplates_getScoutTemplate
      summary: Get a scout template
      description: スカウトテンプレート取得（企業認証）
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ScoutTemplateResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - ScoutTemplates
    put:
      operationId: ScoutTemplates_updateScoutTemplate
      summary: Update a scout template
      description: スカウトテンプレート更新（企業認証）
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ScoutTemplateResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
      tags:
        - ScoutTemplates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.UpdateScoutTemplateRequest'
    delete:
      operationId: ScoutTemplates_deleteScoutTemplate
      summary: Delete a scout template
      description: スカウトテンプレート削除（企業認証）
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - ScoutTemplates
  /api/company/scouts:
    post:
      operationId: CompanyScouts_sendScout
      summary: Send a scout message
      description: スカウト送信（企業認証）
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ScoutMessageResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.ForbiddenError'
      tags:
        - CompanyScouts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.SendScoutRequest'
    get:
      operationId: CompanyScouts_listCompanyScouts
      summary: List scouts sent by the company
      description: 送信済みスカウト一覧（企業認証）
      parameters:
        - name: status
          in: query
          required: false
          description: ステータスで絞り込み
          schema:
            type: string
          explode: false
        - name: limit
          in: query
          required: false
          description: 取得件数
          schema:
            type: integer
            format: int32
          explode: false
        - name: offset
          in: query
          required: false
          description: オフセット
          schema:
            type: integer
            format: int32
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ScoutListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - CompanyScouts
  /api/company/scouts/credits:
    get:
      operationId: CompanyScouts_getScoutCredits
      summary: Get scout credits
      description: スカウトクレジット取得（企業認証）
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
