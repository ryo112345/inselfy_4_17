openapi: 3.0.0
info:
  title: inselfy API
  version: 0.0.0
tags:
  - name: Users
  - name: Experiences
  - name: Educations
  - name: Skills
paths:
  /api/users:
    post:
      operationId: Users_createUser
      summary: Create a new user
      description: ユーザー作成
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UserResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.ConflictError'
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreateUserRequest'
  /api/users/{username}:
    get:
      operationId: Users_getUserByUsername
      summary: Get a user by username
      description: ユーザー名でユーザー取得
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UserResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Users
    patch:
      operationId: Users_updateUserProfile
      summary: Update a user profile
      description: プロフィール更新（PATCH）
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.UserResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.UpdateUserProfileRequest'
  /api/users/{username}/educations:
    get:
      operationId: Educations_listEducations
      summary: List educations for a user
      description: 学歴一覧
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.EducationListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Educations
    post:
      operationId: Educations_createEducation
      summary: Create a new education
      description: 学歴作成
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.EducationResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.ConflictError'
      tags:
        - Educations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreateEducationRequest'
  /api/users/{username}/educations/{educationId}:
    put:
      operationId: Educations_updateEducation
      summary: Update an education
      description: 学歴更新
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: educationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.EducationResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.ForbiddenError'
      tags:
        - Educations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.UpdateEducationRequest'
    delete:
      operationId: Educations_deleteEducation
      summary: Delete an education
      description: 学歴削除
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: educationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.ForbiddenError'
      tags:
        - Educations
  /api/users/{username}/experiences:
    get:
      operationId: Experiences_listExperiences
      summary: List experiences for a user
      description: 職歴一覧
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ExperienceListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Experiences
    post:
      operationId: Experiences_createExperience
      summary: Create a new experience
      description: 職歴作成
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ExperienceResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.ConflictError'
      tags:
        - Experiences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreateExperienceRequest'
  /api/users/{username}/experiences/{experienceId}:
    put:
      operationId: Experiences_updateExperience
      summary: Update an experience
      description: 職歴更新
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: experienceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ExperienceResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.ForbiddenError'
      tags:
        - Experiences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.UpdateExperienceRequest'
    delete:
      operationId: Experiences_deleteExperience
      summary: Delete an experience
      description: 職歴削除
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: experienceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.ForbiddenError'
      tags:
        - Experiences
  /api/users/{username}/skills:
    get:
      operationId: Skills_listSkills
      summary: List skills for a user
      description: スキル一覧
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.SkillListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Skills
    post:
      operationId: Skills_attachSkill
      summary: Attach a skill to a user
      description: スキル追加（グローバルに無ければ作成）
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.SkillResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.BadRequestError'
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.ConflictError'
      tags:
        - Skills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.AttachSkillRequest'
  /api/users/{username}/skills/{name}:
    delete:
      operationId: Skills_detachSkill
      summary: Detach a skill by name
      description: スキル取り外し（名前で）
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Models.NotFoundError'
                  - $ref: '#/components/schemas/Models.BadRequestError'
      tags:
        - Skills
components:
  schemas:
    Models.AttachSkillRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: スキル名（1-100文字）
      description: スキル追加リクエスト
    Models.BadRequestError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - BAD_REQUEST
        message:
          type: string
        details: {}
      description: Bad Request エラー
    Models.ConflictError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - CONFLICT
        message:
          type: string
      description: Conflict エラー
    Models.CreateEducationRequest:
      type: object
      required:
        - school
      properties:
        school:
          type: string
          minLength: 1
          maxLength: 200
          description: 学校名
        degree:
          type: string
          nullable: true
          maxLength: 200
          description: 学部・学科・学位
        startYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 入学年
        endYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 卒業年
      description: 学歴作成リクエスト
    Models.CreateExperienceRequest:
      type: object
      required:
        - companyName
        - title
        - startYear
        - startMonth
        - isCurrent
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 200
          description: 会社名
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: 役職・タイトル
        startYear:
          type: integer
          format: int32
          minimum: 1950
          maximum: 2100
          description: 開始年
        startMonth:
          type: integer
          format: int32
          minimum: 1
          maximum: 12
          description: 開始月（1-12）
        endYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 終了年（現職の場合は null）
        endMonth:
          type: integer
          format: int32
          nullable: true
          minimum: 1
          maximum: 12
          description: 終了月（現職の場合は null）
        isCurrent:
          type: boolean
          description: 現職フラグ
        description:
          type: string
          maxLength: 5000
          description: 業務内容（自然文、5000文字以内）
      description: 職歴作成リクエスト
    Models.CreateUserRequest:
      type: object
      required:
        - name
        - username
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: 表示名（1-100文字）
        username:
          type: string
          pattern: ^[a-zA-Z0-9_]{3,20}$
          description: ユーザー名（3-20文字、半角英数字とアンダースコア）
      description: ユーザー作成リクエスト
    Models.EducationListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Models.EducationResponse'
          description: 学歴
      description: 学歴一覧
    Models.EducationResponse:
      type: object
      required:
        - id
        - userId
        - school
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: ID
        userId:
          type: string
          description: ユーザーID
        school:
          type: string
          description: 学校名
        degree:
          type: string
          nullable: true
          description: 学部・学科
        startYear:
          type: integer
          format: int32
          nullable: true
          description: 入学年
        endYear:
          type: integer
          format: int32
          nullable: true
          description: 卒業年
        createdAt:
          type: string
          format: date-time
          description: 作成日時
        updatedAt:
          type: string
          format: date-time
          description: 更新日時
      description: 学歴
    Models.ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: エラーコード
        message:
          type: string
          description: エラーメッセージ
        details:
          description: 詳細情報（オプション）
      description: 共通エラーレスポンス
    Models.ExperienceListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Models.ExperienceResponse'
          description: 職歴
      description: 職歴一覧
    Models.ExperienceResponse:
      type: object
      required:
        - id
        - userId
        - companyName
        - title
        - startYear
        - startMonth
        - isCurrent
        - description
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: ID
        userId:
          type: string
          description: ユーザーID
        companyName:
          type: string
          description: 会社名
        title:
          type: string
          description: タイトル
        startYear:
          type: integer
          format: int32
          description: 開始年
        startMonth:
          type: integer
          format: int32
          description: 開始月
        endYear:
          type: integer
          format: int32
          nullable: true
          description: 終了年
        endMonth:
          type: integer
          format: int32
          nullable: true
          description: 終了月
        isCurrent:
          type: boolean
          description: 現職フラグ
        description:
          type: string
          description: 業務内容
        createdAt:
          type: string
          format: date-time
          description: 作成日時
        updatedAt:
          type: string
          format: date-time
          description: 更新日時
      description: 職歴
    Models.ForbiddenError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - FORBIDDEN
        message:
          type: string
      description: Forbidden エラー
    Models.NotFoundError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
        message:
          type: string
      description: Not Found エラー
    Models.SkillListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Models.SkillResponse'
          description: スキル
      description: スキル一覧
    Models.SkillResponse:
      type: object
      required:
        - id
        - name
        - attachedAt
      properties:
        id:
          type: string
          description: スキルID
        name:
          type: string
          description: スキル名
        attachedAt:
          type: string
          format: date-time
          description: 追加日時（user_skills.created_at）
      description: スキル
    Models.UpdateEducationRequest:
      type: object
      required:
        - school
      properties:
        school:
          type: string
          minLength: 1
          maxLength: 200
          description: 学校名
        degree:
          type: string
          nullable: true
          maxLength: 200
          description: 学部・学科・学位
        startYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 入学年
        endYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 卒業年
      description: 学歴更新リクエスト
    Models.UpdateExperienceRequest:
      type: object
      required:
        - companyName
        - title
        - startYear
        - startMonth
        - isCurrent
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 200
          description: 会社名
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: 役職・タイトル
        startYear:
          type: integer
          format: int32
          minimum: 1950
          maximum: 2100
          description: 開始年
        startMonth:
          type: integer
          format: int32
          minimum: 1
          maximum: 12
          description: 開始月（1-12）
        endYear:
          type: integer
          format: int32
          nullable: true
          minimum: 1950
          maximum: 2100
          description: 終了年（現職の場合は null）
        endMonth:
          type: integer
          format: int32
          nullable: true
          minimum: 1
          maximum: 12
          description: 終了月（現職の場合は null）
        isCurrent:
          type: boolean
          description: 現職フラグ
        description:
          type: string
          maxLength: 5000
          description: 業務内容（自然文、5000文字以内）
      description: 職歴更新リクエスト（全項目置換）
    Models.UpdateUserProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: 表示名
        displayName:
          type: string
          nullable: true
          maxLength: 100
          description: 表記名（日本語などのフル表示名）
        headline:
          type: string
          nullable: true
          maxLength: 255
          description: ヘッドライン（肩書き・一言）
        location:
          type: string
          nullable: true
          maxLength: 100
          description: 居住地
        about:
          type: string
          nullable: true
          maxLength: 2000
          description: 自己紹介
        industry:
          type: string
          nullable: true
          maxLength: 100
          description: 業界
        jobType:
          type: string
          nullable: true
          maxLength: 50
          description: 職種タグ
        jobSeekingStatus:
          type: string
          nullable: true
          maxLength: 50
          description: 求職ステータス
        profileColor:
          type: string
          nullable: true
          pattern: ^#[0-9A-Fa-f]{6}$
          description: プロフィールカラー（`#RRGGBB`）
        isPublic:
          type: boolean
          description: プロフィール公開フラグ
      description: プロフィール更新リクエスト（PATCH。指定したキーのみ差分適用）。値に null を渡すとフィールドをクリア。
    Models.UserResponse:
      type: object
      required:
        - id
        - username
        - name
        - isPublic
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: ユーザーID
        username:
          type: string
          description: ユーザー名
        name:
          type: string
          description: 表示名
        displayName:
          type: string
          nullable: true
          description: フル表示名
        headline:
          type: string
          nullable: true
          description: ヘッドライン
        location:
          type: string
          nullable: true
          description: 居住地
        about:
          type: string
          nullable: true
          description: 自己紹介
        industry:
          type: string
          nullable: true
          description: 業界
        jobType:
          type: string
          nullable: true
          description: 職種
        jobSeekingStatus:
          type: string
          nullable: true
          description: 求職ステータス
        profileColor:
          type: string
          nullable: true
          description: プロフィールカラー
        isPublic:
          type: boolean
          description: 公開フラグ
        createdAt:
          type: string
          format: date-time
          description: 作成日時
        updatedAt:
          type: string
          format: date-time
          description: 更新日時
      description: ユーザー情報
servers:
  - url: http://localhost:8081
    description: Development server
    variables: {}
