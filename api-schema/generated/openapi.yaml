          type: string
          description: 基本興味領域ID
        score:
          type: number
          format: double
          description: スコア
        rank:
          type: integer
          format: int32
          description: 順位
      description: 基本興味領域スコア
    Models.CIItemResponse:
      type: object
      required:
        - question_number
