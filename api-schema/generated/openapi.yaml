  /api/company/scouts/{scoutId}/reply:
    post:
      operationId: CompanyScouts_companyScoutReply
      summary: Reply to a scout as the company
      description: スカウトへ返信（企業認証）
      parameters:
        - name: scoutId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
        default:
