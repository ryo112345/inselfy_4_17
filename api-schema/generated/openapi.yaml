components:
  schemas:
    Models.AttachSkillRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: スキル名（1-100文字）
      description: スキル追加リクエスト
    Models.AuthUserResponse:
      type: object
      required:
        - id
        - username
        - name
        - needsSetup
        - createdAt
      properties:
        id:
          type: string
          description: ユーザーID
        username:
          type: string
          description: ユーザー名
        name:
          type: string
          description: 表示名
        avatarUrl:
          type: string
          description: アバター画像URL
        email:
          type: string
          description: メールアドレス
        needsSetup:
          type: boolean
          description: 初期セットアップが必要か（自動生成ユーザー名のまま）
        createdAt:
          type: string
          format: date-time
          description: 作成日時
      description: 認証ユーザー情報（トークンは HttpOnly cookie で返る）
    Models.BadRequestError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - BAD_REQUEST
        message:
          type: string
        details: {}
      description: Bad Request エラー
    Models.BulkDeclineRequest:
      type: object
      required:
        - scoutIds
      properties:
        scoutIds:
          type: array
          items:
            type: string
          description: スカウトID一覧
      description: スカウト一括辞退リクエスト
    Models.BulkRespondRequest:
      type: object
      required:
        - scoutIds
