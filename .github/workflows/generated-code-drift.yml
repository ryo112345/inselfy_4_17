name: generated-code drift check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "api-schema/**"
      - "backend/**"
      - "frontend/src/external/client/api/generated/**"
      - "scripts/check-generated-drift.sh"
      - ".github/workflows/generated-code-drift.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api-schema/package-lock.json

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.0"
          cache-dependency-path: backend/go.sum

      # ローカルと同じバージョンに固定する（ズレると差分が偽陽性になる）
      # sqlc v1.31.1 はビルドに go >= 1.26 を要求する（setup-go は GOTOOLCHAIN=local に
      # するため 1.25.0 のままだと install が落ちる）。sqlc のビルドだけ 1.26 を使う。
      # 生成コードは sqlc 自体のバージョンで決まり、ビルドに使う Go には依存しない。
      - name: Install Go codegen tools
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.6.0
          GOTOOLCHAIN=go1.26.0 go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          go install github.com/jmattheis/goverter/cmd/goverter@v1.9.4

      - name: Install TypeSpec toolchain
        run: npm ci --prefix api-schema

      - name: Regenerate and check drift
        run: ./scripts/check-generated-drift.sh
