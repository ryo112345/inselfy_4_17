name: generated-code drift check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "api-schema/**"
      - "backend/**"
      - "frontend/src/external/client/api/generated/**"
      - "scripts/check-generated-drift.sh"
      - ".github/workflows/generated-code-drift.yml"

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api-schema/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache-dependency-path: backend/go.sum

      # ローカルと同じバージョンに固定する（ズレると差分が偽陽性になる）
      - name: Install Go codegen tools
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.6.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          go install github.com/jmattheis/goverter/cmd/goverter@v1.9.4

      - name: Install TypeSpec toolchain
        run: npm ci --prefix api-schema

      - name: Regenerate and check drift
        run: ./scripts/check-generated-drift.sh
