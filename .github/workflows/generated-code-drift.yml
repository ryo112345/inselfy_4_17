name: generated-code drift check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "api-schema/**"
      - "backend/**"
      - "frontend/src/external/client/api/generated/**"
      - "scripts/check-generated-drift.sh"
      - ".github/workflows/generated-code-drift.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api-schema/package-lock.json

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.0"
          cache-dependency-path: backend/go.sum

      # goverter は backend/go.mod の tool ディレクティブで管理され go tool 経由で
      # 実行されるためインストール不要。oapi-codegen / sqlc は tool 化できないため、
      # Makefile に固定したバージョンを install する（ローカルとズレると差分が偽陽性になる）。
      - name: Install codegen tools
        run: make -C backend install-codegen-tools

      - name: Install TypeSpec toolchain
        run: npm ci --prefix api-schema

      - name: Regenerate and check drift
        run: ./scripts/check-generated-drift.sh
