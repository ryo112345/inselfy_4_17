# フロントエンド CI: biome check → tsc --noEmit → vitest → next build。
# サードパーティ action はコミット SHA でピン留めする（タグは動かせるため）。
# main への push では deploy.yml が workflow_call でこれを呼ぶ（CD のゲート、C10）。
# push トリガを持たないのは deploy 経由との二重実行を避けるため。
name: frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".octocov.frontend.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  # workflow_call 時の github.workflow は呼び出し元の名前になるため直書き
  # （詳細は backend-ci.yml の同箇所コメント参照）
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # octocov が PR にカバレッジをコメントするため
      pull-requests: write
      # octocov が前回レポートの取得・保存に GitHub Actions Artifacts を使うため
      actions: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # cross-verify.test.ts（TS/Go の BT 推定の数値一致検証）が backend の
      # go test を spawn するため Go も必要。無いと toolchain ダウンロードで
      # execSync がタイムアウトする
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test -- --coverage

      # .octocov.frontend.yml: カバレッジを PR にコメントする（可視化のみ・ゲートなし）。
      # レポートは backend と別名の Actions Artifact に保存
      - name: Report coverage (octocov)
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          config: .octocov.frontend.yml

      # Next.js のビルドキャッシュ（依存が同じ間はソース変更でも部分再利用される）
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**/*.ts', 'frontend/src/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Build
        run: npm run build

      # --- バンドルサイズ差分（frontend-followup-backlog §5-2）---
      # Next 16 (Turbopack) は per-route サイズ表を出力しないため、集計値
      # （共有 First Load JS・総 JS/CSS gzip）を scripts/bundle-size.mjs で自前計測。
      # ベースラインは octocov と同じく main（deploy 経由の実行）の Actions Artifact
      - name: Measure bundle size
        run: node scripts/bundle-size.mjs measure

      - name: Upload bundle size baseline (main)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-size
          path: frontend/bundle-size.json

      # PR では main の最新デプロイ run のベースラインと比較し、マーカー付き
      # コメントを upsert する（push のたびに新規コメントを増やさない）
      - name: Comment bundle size diff (PR)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow deploy.yml --branch main \
            --status success --limit 1 --json databaseId --jq '.[0].databaseId' || true)
          if [ -n "$run_id" ]; then
            gh run download "$run_id" --repo "$GITHUB_REPOSITORY" -n bundle-size -D /tmp/bundle-base \
              || echo "baseline artifact なし（初回 or 期限切れ）"
          fi
          node scripts/bundle-size.mjs compare /tmp/bundle-base/bundle-size.json bundle-size.json \
            > /tmp/bundle-comment.md
          existing=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --paginate \
            --jq '[.[] | select(.body | startswith("<!-- bundle-size -->"))][0].id // empty')
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing" \
              -F body=@/tmp/bundle-comment.md > /dev/null
          else
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              -F body=@/tmp/bundle-comment.md > /dev/null
          fi
