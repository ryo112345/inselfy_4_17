# フロントエンド CI: biome check → tsc --noEmit → vitest → next build。
# サードパーティ action はコミット SHA でピン留めする（タグは動かせるため）。
# main への push では deploy.yml が workflow_call でこれを呼ぶ（CD のゲート、C10）。
# push トリガを持たないのは deploy 経由との二重実行を避けるため。
name: frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  # workflow_call 時の github.workflow は呼び出し元の名前になるため直書き
  # （詳細は backend-ci.yml の同箇所コメント参照）
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # cross-verify.test.ts（TS/Go の BT 推定の数値一致検証）が backend の
      # go test を spawn するため Go も必要。無いと toolchain ダウンロードで
      # execSync がタイムアウトする
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test

      # Next.js のビルドキャッシュ（依存が同じ間はソース変更でも部分再利用される）
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**/*.ts', 'frontend/src/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Build
        run: npm run build
