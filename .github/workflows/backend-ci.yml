# バックエンド CI: build → vet → golangci-lint(depguard) → test。
# サードパーティ action はコミット SHA でピン留めする（タグは動かせるため）。
# main への push では deploy.yml が workflow_call でこれを呼ぶ（CD のゲート、C10）。
# push トリガを持たないのは deploy 経由との二重実行を避けるため。
name: backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".octocov.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  # workflow_call 時の github.workflow は「呼び出し元」の名前になるため、
  # ${{ github.workflow }} だと deploy から呼ばれた 4 ワークフローが同一グループに
  # なり相互キャンセルする。ファイル名を直書きして固有グループにする。
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # octocov が PR にカバレッジをコメントするため
      pull-requests: write
      # octocov が前回レポートの取得・保存に GitHub Actions Artifacts を使うため
      actions: write
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        # compose.yml と同じイメージに揃える
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: inselfy
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # .golangci.yml の depguard で層境界（controller の pgx 直結禁止）を強制する
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          working-directory: backend

      - name: Test
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: inselfy
        run: make test-cover

      # .octocov.yml: カバレッジを PR にコメントし、main の前回レポートより
      # 下がったら（-1pt 超）落とす。レポートは Actions Artifacts に保存
      - name: Report coverage (octocov)
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
