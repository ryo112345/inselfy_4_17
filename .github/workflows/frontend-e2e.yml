# Playwright E2E (frontend/e2e/ の全スペック):
# 本番と同じ Dockerfile を compose で結合起動し、seed.sql を投入してブラウザ E2E を回す。
# e2e-smoke（curl ベース・デプロイゲート）とは役割を分ける:
#   - smoke: 薄く・速く・ブロッキング（結合で死ぬ系の検知）
#   - ここ:  厚く・遅く・非ブロッキング（UI 挙動の回帰検知。デプロイは止めない）
# main push + nightly で回す。nightly はコード変更が無くても flaky・環境起因の劣化を拾うため。
# 安定運用が確認できたらデプロイゲート昇格を検討する（deploy.yml の needs に足すだけ）。
# サードパーティ action はコミット SHA でピン留めする（タグは動かせるため）。
name: frontend e2e

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "compose.yml"
      - ".github/workflows/frontend-e2e.yml"
  schedule:
    - cron: "0 20 * * *" # 毎日 5:00 JST
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # migrate は one-shot で正常終了するため `up --wait` は使わない（e2e-smoke.yml と同じ理由）
      - name: Start stack
        run: docker compose --profile e2e up -d --build

      # app は migrate 完了後に起動する（depends_on）ので、readyz が通れば
      # マイグレーション適用済み・DB 接続済みが保証される
      - name: Wait for stack
        run: |
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:18081/readyz 2>/dev/null; then exit 0; fi
            sleep 2
          done
          echo "::error::app が 120 秒以内に ready にならない"
          exit 1

      # e2e スペックは開発シードの固定データ（企業・候補者・求人 ID）に依存する
      - name: Load seed data
        run: docker compose exec -T db psql -U user -d inselfy -v ON_ERROR_STOP=1 -q < backend/scripts/seed.sql

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:18080
          # compose.yml の app に設定した e2e スタック専用キー（bypass-login 用）
          ADMIN_API_KEY: e2e-admin-key
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: docker compose --profile e2e logs

      # CI のみ -v で volume ごと破棄（ローカルでは開発 DB を共有しているため -v 禁止）
      - name: Teardown
        if: always()
        run: docker compose --profile e2e down -v
