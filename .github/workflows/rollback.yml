# 1クリックロールバック (C10): 直前の健全リビジョン（または指定リビジョン）へ
# トラフィックを 100% 戻す。イメージ再ビルド無しで数十秒で完了する。
# DB は expand-contract 縛りにより旧リビジョンでも新スキーマで動ける前提
# （規律とrunbookは docs/cd-rollback.md）。
# 注意: 戻した後に deploy.yml を実行すると HEAD のリビジョンに再度切り替わる
# （復帰はそれで行う。壊れたコミットは revert してから deploy する）。
# サードパーティ action はコミット SHA でピン留めする（タグは動かせるため）。
name: rollback

on:
  workflow_dispatch:
    inputs:
      revision:
        description: "戻し先リビジョン名（空 = 現在配信中の1つ前の Ready リビジョン）"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  # deploy.yml と同一グループにして相互排他（デプロイ進行中のロールバック等の交錯を防ぐ）
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGION: asia-northeast1
  SERVICE: inselfy
  WIF_PROVIDER: projects/943028700787/locations/global/workloadIdentityPools/github/providers/github-oidc
  DEPLOYER_SA: github-deployer@inselfy.iam.gserviceaccount.com

jobs:
  rollback:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC トークン発行
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      # 「1つ前」= 現在 100% 配信中のリビジョンより古い、最初の Ready リビジョン。
      # 直近デプロイが candidate 検証で落ちた 0% リビジョンは current より新しい側に
      # いるので選ばれない
      - name: Resolve target revision
        run: |
          TARGET="${{ inputs.revision }}"
          if [ -z "$TARGET" ]; then
            CURRENT=$(gcloud run services describe "$SERVICE" --region "$REGION" --format=json \
              | jq -r '[.status.traffic[] | select(.percent == 100) | .revisionName] | first // empty')
            echo "current: $CURRENT"
            TARGET=$(gcloud run revisions list --service "$SERVICE" --region "$REGION" \
              --sort-by='~metadata.creationTimestamp' --format=json \
              | jq -r --arg cur "$CURRENT" '
                  [.[] | select(any(.status.conditions[]?; .type=="Ready" and .status=="True"))
                       | .metadata.name]
                  | if index($cur) then .[(index($cur) + 1)] // empty else empty end')
          fi
          if [ -z "$TARGET" ]; then
            echo "::error::戻し先リビジョンが見つからない（revision 入力で明示指定してください）"
            exit 1
          fi
          echo "target: $TARGET"
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"

      # --to-latest は使わない（壊れた最新リビジョンに戻ってしまうため必ず名前指定）
      - name: Shift 100% traffic to target revision
        run: gcloud run services update-traffic "$SERVICE" --region "$REGION" --to-revisions="$TARGET=100"

      # 検証は / を叩く（/api/readyz は C10 以前の古いリビジョンには存在しないため、
      # どのリビジョンへ戻しても応答するパスで確認する）
      - name: Verify
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE" --region "$REGION" --format='value(status.url)')
          curl -fsS -o /dev/null -w '%{http_code}\n' "$SERVICE_URL/"
          gcloud run services describe "$SERVICE" --region "$REGION" \
            --format='value(status.traffic.revisionName,status.traffic.percent)'
