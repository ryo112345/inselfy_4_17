# E2E スモークテスト (C7):
# 本番と同じ Dockerfile を compose で結合起動（PostgreSQL + migrate + front/API 同居イメージ）し、
# 主要エンドポイントを数本だけ叩く。単体 CI（backend/frontend/migrations）が緑でも
# 結合で死ぬ系（DI 配線・プロキシ設定・スキーマずれ）を検知するのが目的。
# E2E は増やすほど flaky になるので意図的に薄く保つ（検証内容は scripts/e2e-smoke.sh）。
name: e2e smoke

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "compose.yml"
      - "scripts/e2e-smoke.sh"
      - ".github/workflows/e2e-smoke.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "compose.yml"
      - "scripts/e2e-smoke.sh"
      - ".github/workflows/e2e-smoke.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # migrate は one-shot で正常終了するため `up --wait` は使わない
      # （終了済みコンテナを unhealthy 扱いする compose の挙動を踏まないように）。
      # 起動待ちはスモークスクリプト側の readyz ポーリングで行う。
      - name: Start stack
        run: docker compose --profile e2e up -d --build

      - name: Run smoke tests
        run: ./scripts/e2e-smoke.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose --profile e2e logs

      - name: Teardown
        if: always()
        run: docker compose --profile e2e down -v
